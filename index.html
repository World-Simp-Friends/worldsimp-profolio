    <style>
        /* CRITICAL CSS FOR LOADER - Prevents FOUC */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.8s cubic-bezier(0.65, 0, 0.35, 1), visibility 0.8s;
            overflow: hidden;
        }

        .global-loader__bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #f0f7ff 100%);
            z-index: -1;
        }

        .global-loader__shimmer {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(45deg,
                    rgba(64, 145, 255, 0) 0%,
                    rgba(64, 145, 255, 0.03) 45%,
                    rgba(64, 145, 255, 0.08) 50%,
                    rgba(64, 145, 255, 0.03) 55%,
                    rgba(64, 145, 255, 0) 100%);
            animation: loaderShimmer 4s infinite linear;
            pointer-events: none;
        }

        .global-loader__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            position: relative;
        }

        .global-loader__logo-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .global-loader__logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(64, 145, 255, 0.2));
            animation: loaderFloat 3s infinite ease-in-out;
            z-index: 2;
        }

        .global-loader__ring {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(64, 145, 255, 0.1);
            border-top-color: #4091ff;
            animation: loaderSpin 2s infinite linear;
            z-index: 1;
        }

        @font-face {
            font-family: 'KH Interference';
            src: url('/assets/fonts/KHInterferenceTRIAL-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'KH Interference';
            src: url('/assets/fonts/KHInterferenceTRIAL-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        .global-loader__text {
            font-family: "KH Interference", "Russo One", sans-serif;
            font-size: 1.8rem;
            color: #4091ff;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            animation: loaderPulseText 2s infinite ease-in-out;
            margin-top: 10px;
        }

        @keyframes loaderShimmer {
            0% {
                transform: translate(-30%, -30%) rotate(0deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        @keyframes loaderFloat {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-10px) scale(1.02);
            }
        }

        @keyframes loaderSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes loaderPulseText {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(0.98);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .global-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
